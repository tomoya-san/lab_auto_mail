name: Deploy to Vercel (production)

# Ships on every push to main. App runtime secrets live in the Vercel project
# (not here) — the deployed functions read them at request time. This workflow
# only needs credentials to talk to Vercel: VERCEL_TOKEN / VERCEL_ORG_ID /
# VERCEL_PROJECT_ID, stored as GitHub repository secrets.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Avoid overlapping prod deploys if you push twice quickly.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
